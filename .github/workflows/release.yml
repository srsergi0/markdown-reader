name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build frontend
        run: bunx vite build

      - name: Build Electrobun (Windows)
        run: bunx electrobun build --env stable

      - name: List build output
        run: |
          Write-Host "=== build/ directory ==="
          Get-ChildItem -Path build -Recurse -Depth 2 | ForEach-Object { $_.FullName }

      - name: Create zip
        run: |
          $buildDir = Get-ChildItem -Path build -Directory | Where-Object { $_.Name -like "*win*" } | Select-Object -First 1
          if (-not $buildDir) {
            Write-Host "Available directories:"
            Get-ChildItem -Path build -Directory | ForEach-Object { $_.Name }
            throw "No Windows build directory found"
          }
          $zipName = "MarkdownReader-Windows-x64.zip"
          Compress-Archive -Path "$($buildDir.FullName)\*" -DestinationPath $zipName
          Write-Host "Created $zipName"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: "*.zip"

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build frontend
        run: bunx vite build

      - name: Build Electrobun (macOS)
        run: bunx electrobun build --env stable

      - name: List build output
        run: find build -maxdepth 2 -type d

      - name: Create zip
        run: |
          BUILD_DIR=$(find build -maxdepth 1 -type d -name "*macos*" | head -1)
          if [ -z "$BUILD_DIR" ]; then
            echo "Available directories:"
            ls -la build/
            echo "No macOS build directory found"
            exit 1
          fi
          zip -r MarkdownReader-macOS.zip "$BUILD_DIR"/*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-zip
          path: "*.zip"

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build frontend
        run: bunx vite build

      - name: Build Electrobun (Linux)
        run: bunx electrobun build --env stable

      - name: List build output
        run: find build -maxdepth 2 -type d

      - name: Create tar.gz
        run: |
          BUILD_DIR=$(find build -maxdepth 1 -type d -name "*linux*" | head -1)
          if [ -z "$BUILD_DIR" ]; then
            echo "Available directories:"
            ls -la build/
            echo "No Linux build directory found"
            exit 1
          fi
          tar -czf MarkdownReader-Linux-x64.tar.gz -C "$(dirname $BUILD_DIR)" "$(basename $BUILD_DIR)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-tar
          path: "*.tar.gz"

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || github.event.inputs.tag }}
          name: "Markdown Reader ${{ github.ref_name || github.event.inputs.tag }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/**/*.zip
            artifacts/**/*.tar.gz
