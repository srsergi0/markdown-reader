name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build Electrobun (Windows)
        run: bunx electrobun build --env stable

      - name: List artifacts
        run: Get-ChildItem -Path artifacts -Recurse

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: artifacts/*

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build Electrobun (macOS)
        run: bunx electrobun build --env stable

      - name: List artifacts
        run: ls -la artifacts/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: artifacts/*

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build Electrobun (Linux)
        run: bunx electrobun build --env stable

      - name: List artifacts
        run: ls -la artifacts/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: artifacts/*

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release-files
          find all-artifacts -type f ! -name "*.json" ! -name "*.patch" | while read f; do
            basename "$f"
            cp "$f" release-files/
          done

      - name: List release files
        run: ls -la release-files/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || github.event.inputs.tag }}
          name: "Markdown Reader ${{ github.ref_name || github.event.inputs.tag }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: release-files/*
