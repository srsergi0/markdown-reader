name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build Electrobun (Windows)
        run: bunx electrobun build --env stable

      - name: List all output
        shell: pwsh
        run: |
          Write-Host "=== Root directory ==="
          Get-ChildItem -Path . -Directory | ForEach-Object { $_.Name }
          Write-Host "=== build/ ==="
          if (Test-Path build) { Get-ChildItem -Path build -Recurse -Depth 2 | ForEach-Object { $_.FullName } }
          Write-Host "=== artifacts/ ==="
          if (Test-Path artifacts) { Get-ChildItem -Path artifacts -Recurse | ForEach-Object { $_.FullName } }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            build/**/*.zip
            build/**/*.tar.zst
            artifacts/*

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build Electrobun (macOS)
        run: bunx electrobun build --env stable

      - name: List all output
        run: |
          echo "=== Root directory ==="
          ls -d */ 2>/dev/null || true
          echo "=== build/ ==="
          find build -maxdepth 2 -type f 2>/dev/null || echo "no build/"
          echo "=== artifacts/ ==="
          find artifacts -type f 2>/dev/null || echo "no artifacts/"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: |
            build/**/*.dmg
            build/**/*.app.tar.zst
            artifacts/*

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build Electrobun (Linux)
        run: bunx electrobun build --env stable

      - name: List all output
        run: |
          echo "=== Root directory ==="
          ls -d */ 2>/dev/null || true
          echo "=== build/ ==="
          find build -maxdepth 2 -type f 2>/dev/null || echo "no build/"
          echo "=== artifacts/ ==="
          find artifacts -type f 2>/dev/null || echo "no artifacts/"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            build/**/*.tar.gz
            build/**/*.tar.zst
            artifacts/*

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release-files
          find all-artifacts -type f ! -name "*.json" ! -name "*.patch" | while read f; do
            basename "$f"
            cp "$f" release-files/
          done

      - name: List release files
        run: ls -la release-files/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || github.event.inputs.tag }}
          name: "Markdown Reader ${{ github.ref_name || github.event.inputs.tag }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: release-files/*
