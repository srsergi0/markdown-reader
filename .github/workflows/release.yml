name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build frontend
        run: bunx vite build

      - name: Build Electrobun (Windows)
        run: bunx electrobun build --env stable

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Prepare installer script
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".Replace("v", "")
          $content = Get-Content "installer.iss" -Raw
          $content = $content -replace '#define MyAppVersion ".*"', "#define MyAppVersion `"$version`""
          # Fix source path to match actual build output
          $content = $content -replace 'Source: "build\\stable-win-x64\\MarkdownReader\\\*"', 'Source: "build\dev-win-x64\MarkdownReader-dev\*"'
          Set-Content "installer.iss" $content
          Write-Host "Updated installer.iss with version $version"
          Get-Content "installer.iss"

      - name: Build installer
        run: & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: installer/*.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build frontend
        run: bunx vite build

      - name: Build Electrobun (macOS)
        run: bunx electrobun build --env stable

      - name: Create DMG
        run: |
          APP_PATH=$(find build -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "No .app bundle found"
            find build -maxdepth 3 -type d
            exit 1
          fi
          echo "Found app: $APP_PATH"
          hdiutil create -volname "Markdown Reader" \
            -srcfolder "$APP_PATH" \
            -ov -format UDZO \
            "MarkdownReader-macOS.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: "*.dmg"

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build frontend
        run: bunx vite build

      - name: Build Electrobun (Linux)
        run: bunx electrobun build --env stable

      - name: Create tar.gz
        run: |
          BUILD_DIR=$(find build -maxdepth 1 -type d -name "*linux*" | head -1)
          if [ -z "$BUILD_DIR" ]; then
            echo "No Linux build directory found"
            ls -la build/
            exit 1
          fi
          tar -czf MarkdownReader-Linux-x64.tar.gz -C "$(dirname $BUILD_DIR)" "$(basename $BUILD_DIR)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-tar
          path: "*.tar.gz"

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || github.event.inputs.tag }}
          name: "Markdown Reader ${{ github.ref_name || github.event.inputs.tag }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.tar.gz
