name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build:prod

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: build/stable-win-x64/*.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bunx electrobun build --env stable

      - name: Create DMG
        run: |
          APP_PATH=$(find build -name "*.app" -type d | head -1)
          echo "Found: $APP_PATH"
          hdiutil create -volname "Markdown Reader" \
            -srcfolder "$APP_PATH" \
            -ov -format UDZO \
            "MarkdownReader-macOS.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: "*.dmg"

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bunx electrobun build --env stable

      - name: Create tar.gz
        run: |
          BUILD_DIR=$(find build -maxdepth 1 -type d -name "*linux*" | head -1)
          INNER_DIR=$(find "$BUILD_DIR" -maxdepth 1 -type d | tail -1)
          tar -czf MarkdownReader-Linux-x64.tar.gz -C "$BUILD_DIR" "$(basename $INNER_DIR)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-tarball
          path: "*.tar.gz"

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Markdown Reader ${{ github.ref_name }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/windows-installer/*
            artifacts/macos-dmg/*
            artifacts/linux-tarball/*
